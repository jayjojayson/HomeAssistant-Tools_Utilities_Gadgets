<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HA Game Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #080a0f;
            color: #e1e1e1;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ── MENU ─────────────────────────────────────── */
        #menu {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #menu-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: #0d1117;
            border-bottom: 1px solid #1f2937;
        }

        #menu-header .logo {
            font-size: 1.6em;
        }

        #menu-header h1 {
            font-size: 1.2em;
            font-weight: 700;
            color: #03a9f4;
            letter-spacing: 0.05em;
        }

        #menu-header .subtitle {
            font-size: 0.75em;
            color: #6b7280;
            margin-top: 1px;
        }

        #game-grid {
            flex: 1 1 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            padding: 16px;
            overflow-y: auto;
            scrollbar-width: none;
            align-content: start;
        }

        .game-card {
            background: #0d1117;
            border: 1px solid #1f2937;
            border-radius: 14px;
            padding: 20px 14px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .game-card:hover, .game-card:active {
            transform: scale(0.97);
            border-color: var(--accent);
            box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 35%, transparent);
        }

        .game-icon {
            font-size: 2.4em;
            margin-bottom: 8px;
        }

        .game-title {
            font-size: 1em;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .game-desc {
            font-size: 0.72em;
            color: #6b7280;
        }

        /* ── GAME OVERLAY ─────────────────────────────── */
        #game-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            flex-direction: column;
        }

        #game-topbar {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: #0d1117;
            border-bottom: 1px solid #1f2937;
        }

        #back-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid #374151;
            color: #9ca3af;
            border-radius: 6px;
            padding: 4px 14px;
            cursor: pointer;
            font-size: 0.82em;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: border-color 0.1s, color 0.1s, background 0.1s;
        }

        #back-btn:hover {
            border-color: #03a9f4;
            color: #03a9f4;
            background: rgba(3,169,244,0.1);
        }

        #game-frame {
            flex: 1 1 auto;
            width: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

<!-- MENU -->
<div id="menu">
    <div id="menu-header">
        <span class="logo">🎮</span>
        <div>
            <h1>HA Game Center</h1>
            <div class="subtitle">Choose Game &amp; play</div>
        </div>
    </div>
    <div id="game-grid">
        
        <div class="game-card" onclick="launchGame('tetris')" style="--accent:#03a9f4">
            <div class="game-icon">🧱</div>
            <div class="game-title">Tetris</div>
            <div class="game-desc">Classic Block Stacker</div>
        </div>
        <div class="game-card" onclick="launchGame('defender')" style="--accent:#00f2ff">
            <div class="game-icon">🚀</div>
            <div class="game-title">Defender</div>
            <div class="game-desc">Neon Overdrive Shooter</div>
        </div>
        <div class="game-card" onclick="launchGame('asteroids')" style="--accent:#ff3d00">
            <div class="game-icon">☄️</div>
            <div class="game-title">Asteroids</div>
            <div class="game-desc">Neon Edition</div>
        </div>
        <div class="game-card" onclick="launchGame('centipede')" style="--accent:#00ff00">
            <div class="game-icon">🐛</div>
            <div class="game-title">Centipede</div>
            <div class="game-desc">Neon Vektor Edition</div>
        </div>
        <div class="game-card" onclick="launchGame('pacman')" style="--accent:#ffff00">
            <div class="game-icon">👻</div>
            <div class="game-title">Pac-Man</div>
            <div class="game-desc">Classic Labyrinth</div>
        </div>
        <div class="game-card" onclick="launchGame('spaceinvaders')" style="--accent:#da8b2e">
            <div class="game-icon">👾</div>
            <div class="game-title">Space Invaders</div>
            <div class="game-desc">Pixel Art Edition</div>
        </div>
    </div>
</div>

<!-- GAME OVERLAY -->
<div id="game-overlay">
    <div id="game-topbar">
        <button id="back-btn" onclick="backToMenu()">← Menu</button>
    </div>
    <iframe id="game-frame" allow="autoplay" tabindex="0"></iframe>
</div>

function launchGame(id) {
    const g = GAMES[id];
    if (!g) return;
    const bytes = Uint8Array.from(atob(g.data), c => c.charCodeAt(0));
    const html = new TextDecoder('utf-8').decode(bytes);
    const frame = document.getElementById('game-frame');
    frame.onload = function() {
        frame.onload = null;
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open('text/html', 'replace');
        doc.write(html);
        doc.close();
        setTimeout(() => { frame.focus(); try { frame.contentWindow.focus(); } catch(e) {} }, 50);
    };
    frame.src = 'about:blank';
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game-overlay').style.display = 'flex';
}

function backToMenu() {
    const frame = document.getElementById('game-frame');
    frame.onload = null;
    frame.src = 'about:blank';
    document.getElementById('game-overlay').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
}

document.getElementById('game-overlay').addEventListener('click', function(e) {
    if (e.target.id === 'back-btn') return;
    const frame = document.getElementById('game-frame');
    frame.focus();
    try { frame.contentWindow.focus(); } catch(e) {}
});


</script>
